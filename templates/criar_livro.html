{% extends 'base.html' %}

{% block titulo %}
<title>Criar Livro</title>
{% endblock %}

{% block conteudo %}

<h2>Cadastrar Novo Livro</h2>
<form action="/biblioteca/criar" method="POST">
    <input type="hidden" name="acao" value="cadastrar">
    <label>ISBN: <input type="text" name="isbn" required></label><br>
    <label>Título: <input type="text" name="titulo" required></label><br>
    <label>Autor: <input type="text" name="autor" required></label><br>
    <label>Genero: <input type="text" name="genero" required></label>
    <label>Ano Publicacao: <input type="text" name="ano_publicacao" required></label>
    <label>Editora: <input type="text" name="editora" required></label>
    <label>Paginas: <input type="text" name="paginas" required></label>
    <label>Status: <input type="text" name="status" required></label>
    <label>Localizacao: <input type="text" name="localizacao" required></label>

    <button type="submit">Salvar Livro</button>
</form>

{% endblock %}
