{% extends 'base.html' %}

{% block titulo %}
<title>Criar Livro</title>
{% endblock %}

{% block conteudo %}

<body class="container-fluid vh-100 d-flex align-items-center justify-content-center d-flex flex-column">
    <h2 class="display-6">Cadastrar Novo Livro</h2>
    <form action="/biblioteca/criar" method="POST" class="d-flex flex-column w-50 d-flex align-items-center">
        <input type="hidden" name="acao" value="cadastrar">
        <div class="mb-3 w-50">
            <label for="isbn" class="form-label">ISBN:</label>
            <input type="text" name="isbn" class="form-control" required>
        </div>
        <div class="mb-3 w-50">
            <label for="titulo" class="form-label">Título:</label>
            <input type="text" name="titulo" class="form-control" required>
        </div>

        <div class="mb-3 w-50">
            <label for="autor" class="form-label">Autor:</label>
            <input type="text" name="autor" class="form-control" required>
        </div>
        <div class="mb-3 w-50">
            <label for="genero" class="form-label">Gênero:</label>
            <input type="text" name="genero" class="form-control" required>
        </div>

        <div class="mb-3 w-50">
            <label for="ano_publicacao" class="form-label">Ano Publicação:</label>
            <input type="text" name="ano_publicacao" class="form-control" required>
        </div>

        <div class="mb-3 w-50"> 
            <label for="editora" class="form-label">Editora:</label>
            <input type="text" name="editora" class="form-control" required>
        </div>

        <div class="mb-3 w-50">
            <label for="paginas" class="form-label">Páginas:</label>
            <input type="text" name="paginas" class="form-control" required>
        </div>

        <div class="mb-3 w-50">
            <label for="status" class="form-label">Status:</label>
            <input type="text" name="status" class="form-control" required>
        </div>

        <div class="mb-3 w-50">
            <label for="localizacao" class="form-label">Localização:</label>
            <input type="text" name="localizacao" class="form-control" required>
        </div>
        <button type="submit" class="mt-4 btn btn-outline-primary w-25">Alterar Livro</button>
    </form>
</body>
{% endblock %}
